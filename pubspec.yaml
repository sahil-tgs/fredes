name: fredes
description: Free & open-source Figma alternative — offline-first vector design tool.
publish_to: 'none'
version: 0.1.10+11

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  uuid: ^4.5.1
  file_selector: ^1.0.3
  web_socket_channel: ^3.0.1
  collection: ^1.18.0
  auto_updater: ^1.0.0

dev_dependencies:
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
